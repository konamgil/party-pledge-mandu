name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Architecture Guard
        run: bun run guard

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: DB init (sqlite)
        run: |
          bunx mandu db apply
          bunx mandu db seed --env=dev --reset
        env:
          DATABASE_URL: sqlite://./local.db

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: sqlite://./local.db

      - name: Smoke test (dev server + bun test)
        run: |
          PORT=3333 bun run dev > dev.log 2>&1 &
          DEV_PID=$!
          echo "Dev PID: $DEV_PID"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/api/health > /dev/null 2>&1; then
              echo "Dev ready after ${i}s"
              break
            fi
            sleep 1
          done
          TEST_BASE_URL=http://localhost:3333 bun test tests/api/smoke.test.ts
          kill $DEV_PID 2>/dev/null || true
        env:
          DATABASE_URL: sqlite://./local.db

      - name: Upload dev log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-log
          path: dev.log
          retention-days: 3
