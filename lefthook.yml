pre-commit:
  parallel: true
  commands:
    lint:
      glob: "{app,src,spec,tests}/**/*.{ts,tsx,js,jsx}"
      run: bunx oxlint --fix {staged_files} && git add {staged_files}

pre-push:
  parallel: true
  commands:
    # F20 우회: mandu guard/check 가 결과 출력 후 process exit 못 함 (Bun watcher 잔류 추정).
    # timeout 30s 로 강제 종료, exit 124 (timeout) 는 결과 통과로 간주.
    guard:
      run: |
        timeout 30 bun run guard
        EXIT=$?
        if [ $EXIT -eq 124 ] || [ $EXIT -eq 143 ]; then exit 0; fi
        exit $EXIT
    typecheck:
      run: |
        timeout 30 bun run check
        EXIT=$?
        if [ $EXIT -eq 124 ] || [ $EXIT -eq 143 ]; then exit 0; fi
        exit $EXIT
    lint:
      run: bun run lint
# smoke 는 CI workflow 가 dev 자동 spawn 으로 처리.
# 로컬 사전 verify: PORT=3333 bun run dev 띄운 채로 bun test tests/api/smoke.test.ts
