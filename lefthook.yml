pre-commit:
  parallel: true
  commands:
    lint:
      glob: "{app,src,spec,tests}/**/*.{ts,tsx,js,jsx}"
      run: bunx oxlint --fix {staged_files} && git add {staged_files}

pre-push:
  parallel: true
  commands:
    guard:
      run: bun run guard
    typecheck:
      run: bun run check
    lint:
      run: bun run lint
# smoke 는 CI workflow 가 dev 자동 spawn 으로 처리.
# 로컬 사전 verify: PORT=3333 bun run dev 띄운 채로 bun test tests/api/smoke.test.ts
